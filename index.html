<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GATE CSE 2027 — Prep Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap');

:root{
  color-scheme: dark;
  --bg:#0F1419;
  --surface:#161D26;
  --surface-2:#1E2733;
  --border:#2A3441;
  --amber:#F0A93B;
  --teal:#45C4B0;
  --rose:#E8615F;
  --text:#EAEFF5;
  --muted:#8B96A8;
  --muted-2:#5C6678;
}

[data-theme="light"]{
  color-scheme: light;
  --bg:#F4F6F9;
  --surface:#FFFFFF;
  --surface-2:#EAEEF3;
  --border:#DCE3EA;
  --amber:#C97A1A;
  --teal:#12897A;
  --rose:#C7413F;
  --text:#1B2430;
  --muted:#5C6678;
  --muted-2:#8B96A8;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
  min-height:100vh;
  padding:28px 16px 80px;
}

.wrap{max-width:920px;margin:0 auto;}

/* ---------- Header ---------- */
header{
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  flex-wrap:wrap;
  gap:16px;
  margin-bottom:24px;
  padding-bottom:20px;
  border-bottom:1px solid var(--border);
}
.title-block .eyebrow{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  letter-spacing:0.16em;
  color:var(--teal);
  text-transform:uppercase;
  margin-bottom:6px;
}
.title-block h1{
  font-family:'Space Grotesk',sans-serif;
  font-weight:700;
  font-size:28px;
  letter-spacing:-0.01em;
}
.countdown{text-align:right;font-family:'JetBrains Mono',monospace;}
.countdown .num{font-size:36px;font-weight:700;color:var(--amber);line-height:1;}
.countdown .lbl{font-size:11px;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;margin-top:4px;}
.countdown input{
  background:none;border:none;border-bottom:1px dashed var(--muted-2);
  color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:11px;
  margin-top:6px;padding:2px 0;width:120px;text-align:right;
}
.countdown input:focus{outline:none;border-bottom-color:var(--teal);color:var(--text);}

.header-right{display:flex;align-items:flex-end;gap:14px;}
.theme-toggle{
  background:var(--surface-2);border:1px solid var(--border);border-radius:8px;
  width:36px;height:36px;font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;color:var(--text);
  flex-shrink:0;
}
.theme-toggle:hover{border-color:var(--teal);}

/* ---------- Weekly graph ---------- */
.wk-graph{
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:18px 20px;margin-bottom:14px;
  box-shadow:0 1px 4px rgba(0,0,0,0.12);
}
.wk-graph-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:18px;flex-wrap:wrap;gap:4px;}
.wk-graph-title{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14px;}
.wk-graph-total{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);}
.wk-bars-wrap{position:relative;padding-top:14px;}
.wk-bars{display:flex;justify-content:space-between;align-items:flex-end;gap:8px;height:150px;position:relative;z-index:1;}
.wk-gridline{position:absolute;left:0;right:0;border-top:1px dashed var(--border);}
.wk-target-line{position:absolute;left:0;right:0;border-top:1px dashed var(--rose);z-index:2;}
.wk-target-label{
  position:absolute;right:0;top:-15px;
  font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--rose);
  background:var(--surface);padding:0 4px;white-space:nowrap;
}
.wk-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end;}
.wk-bar-val{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:4px;height:12px;}
.wk-bar-track{
  flex:1;width:100%;max-width:32px;height:100%;
  background:var(--surface-2);border-radius:6px;overflow:hidden;
  display:flex;align-items:flex-end;
}
.wk-bar-track.today{box-shadow:0 0 0 2px var(--amber) inset;}
.wk-bar-fill-wrap{width:100%;display:flex;flex-direction:column-reverse;border-radius:6px 6px 0 0;overflow:hidden;transition:height .35s ease;}
.wk-seg{width:100%;min-height:2px;}
.wk-bar-lbl{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted-2);margin-top:6px;}
.wk-bar-lbl.today{color:var(--amber);font-weight:700;}
.wk-bar-lbl.met{color:var(--teal);font-weight:700;}
.wk-legend{display:flex;flex-wrap:wrap;gap:7px;margin-top:16px;padding-top:14px;border-top:1px solid var(--border);}
.wk-legend-chip{
  display:flex;align-items:center;gap:6px;font-size:10.5px;color:var(--text);
  font-family:'JetBrains Mono',monospace;white-space:nowrap;
  background:var(--surface-2);padding:3px 10px;border-radius:20px;
}
.wk-legend-chip i{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0;}
.wk-legend-chip.empty{color:var(--muted-2);background:none;padding:3px 0;white-space:normal;flex-basis:100%;line-height:1.4;}

/* ---------- Stat bar ---------- */
.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
  margin-bottom:28px;
}
.stat-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  padding:16px 16px;
}
.stat-card .val{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;}
.stat-card .val.amber{color:var(--amber);}
.stat-card .val.teal{color:var(--teal);}
.stat-card .lbl{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.3;}
.stat-card.target-card{display:flex;flex-direction:column;justify-content:space-between;}
.target-date-row{margin-top:8px;}
.target-date-row label{
  display:block;font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--muted-2);
  letter-spacing:0.06em;text-transform:uppercase;margin-bottom:3px;
}
.target-date-row input{
  background:var(--surface-2);border:1px solid var(--border);color:var(--text);
  font-family:'JetBrains Mono',monospace;font-size:11px;padding:4px 6px;border-radius:5px;width:100%;
}
.target-date-row input:focus{outline:none;border-color:var(--teal);}

/* ---------- Section head ---------- */
.section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.section-head h2{font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:600;}

/* ---------- Subject cards ---------- */
.subjects{display:flex;flex-direction:column;gap:10px;}

.subject-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
}

.subject-head{
  display:flex;
  align-items:center;
  gap:14px;
  padding:16px 18px;
  cursor:pointer;
  user-select:none;
}
.subject-head .chevron{
  font-size:12px;
  color:var(--muted-2);
  transition:transform .2s ease;
  flex-shrink:0;
  width:12px;
}
.subject-card.open .chevron{transform:rotate(90deg);}

.subject-main{flex:1;min-width:0;}
.subject-name-row{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:8px;}
.subject-name-row .name{
  font-family:'Space Grotesk',sans-serif;
  font-weight:600;
  font-size:15px;
}
.subject-name-row .figure{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  color:var(--muted);
  white-space:nowrap;
}
.subject-name-row .figure .pct{color:var(--amber);font-weight:700;}

.bar-track{height:6px;background:var(--surface-2);border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;transition:width .35s ease;}
.bar-fill.amber{background:var(--amber);}
.bar-fill.teal{background:var(--teal);}

.modules-wrap{
  display:none;
  border-top:1px solid var(--border);
  padding:6px 18px 14px;
}
.subject-card.open .modules-wrap{display:block;}

.module-row{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px 0;
  border-bottom:1px solid var(--border);
}
.module-row:last-child{border-bottom:none;}

.module-check{
  width:18px;height:18px;
  border-radius:5px;
  border:2px solid var(--muted-2);
  background:var(--surface-2);
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;color:var(--bg);
  cursor:pointer;
  transition:all .15s ease;
}
.module-check:hover{border-color:var(--amber);}
.module-check.done{background:var(--amber);border-color:var(--amber);}

.module-body{flex:1;min-width:0;}
.module-top{display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-bottom:6px;flex-wrap:wrap;}
.module-name{font-size:13px;color:var(--text);}
.module-hrs{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  color:var(--muted);
  white-space:nowrap;
}
.module-hrs .at-max{color:var(--amber);}
.hrs-input{
  background:var(--surface-2);
  border:1px solid var(--border);
  color:var(--text);
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  width:52px;
  padding:2px 4px;
  border-radius:5px;
  text-align:right;
}
.hrs-input:focus{outline:none;border-color:var(--teal);}

.module-bar-row{display:flex;align-items:center;gap:8px;}
.module-controls{display:flex;gap:4px;flex-shrink:0;}
.module-controls button{
  background:var(--surface-2);border:1px solid var(--border);color:var(--text);
  font-family:'JetBrains Mono',monospace;font-size:10px;
  padding:2px 7px;border-radius:5px;cursor:pointer;white-space:nowrap;
}
.module-controls button:hover:not(:disabled){border-color:var(--teal);color:var(--teal);}
.module-controls button:disabled{opacity:0.35;cursor:not-allowed;}

footer{
  text-align:center;
  margin-top:40px;
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  color:var(--muted-2);
}
footer button{
  background:none;border:none;color:var(--muted-2);text-decoration:underline;
  cursor:pointer;font-family:inherit;font-size:inherit;
}
footer button:hover{color:var(--rose);}
footer button.confirming{color:var(--rose);text-decoration:none;font-weight:700;}
.footer-row{margin-top:6px;}
.footer-row:first-child{margin-top:0;}
.file-note{color:var(--muted-2);}
.file-note.linked{color:var(--teal);}
.file-note strong{color:var(--text);font-weight:600;}

/* ---------- Daily Log ---------- */
.log-total{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);}
.log-hint{font-size:12px;color:var(--muted-2);margin-bottom:10px;line-height:1.4;}
.log-form{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  padding:16px 18px;
  margin-bottom:14px;
}
.log-form-row{display:flex;gap:14px;margin-bottom:12px;flex-wrap:wrap;}
.log-field{flex:1;min-width:130px;}
.log-form label{
  display:block;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted-2);
  letter-spacing:0.06em;text-transform:uppercase;margin-bottom:5px;
}
.log-form input, .log-form textarea{
  width:100%;
  background:var(--surface-2);border:1px solid var(--border);color:var(--text);
  font-family:'Inter',sans-serif;font-size:13px;padding:7px 9px;border-radius:7px;
}
.log-form input:focus, .log-form textarea:focus{outline:none;border-color:var(--teal);}
.log-form textarea{resize:vertical;margin-bottom:12px;font-family:'Inter',sans-serif;}
.log-form-actions button{
  background:var(--teal);border:none;color:var(--bg);font-weight:600;
  font-family:'Space Grotesk',sans-serif;font-size:13px;
  padding:8px 16px;border-radius:7px;cursor:pointer;
}
.log-form-actions button:hover{opacity:0.9;}
.log-form-actions #cancelLogEditBtn{
  background:none;color:var(--muted);margin-left:8px;font-weight:500;
}
.log-list{display:flex;flex-direction:column;gap:10px;margin-bottom:28px;}
.log-empty{color:var(--muted-2);font-size:13px;padding:8px 2px;}
.log-entry{
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:12px 16px;
}
.log-entry-top{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:10px;}
.log-date{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13px;}
.log-hours{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--teal);white-space:nowrap;}

.session-list{display:flex;flex-direction:column;gap:10px;}
.session-empty{color:var(--muted-2);font-size:12px;}
.session-item{
  padding:10px 12px;background:var(--surface-2);border-radius:8px;
  border:1px solid var(--border);
}
.session-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:5px;}
.session-time{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--muted-2);}
.session-tag{
  font-family:'JetBrains Mono',monospace;font-size:10px;
  border:1px solid;border-radius:10px;padding:1px 8px;white-space:nowrap;
}
.session-note{font-size:13px;color:var(--text);white-space:pre-wrap;line-height:1.4;}
.session-actions{margin-top:7px;display:flex;gap:12px;}
.session-actions button{
  background:none;border:none;color:var(--muted-2);font-size:11px;
  font-family:'JetBrains Mono',monospace;cursor:pointer;text-decoration:underline;
}
.session-actions button:hover{color:var(--teal);}
.session-actions button.deleteSessionBtn:hover{color:var(--rose);}
.session-actions button.confirming{color:var(--rose);text-decoration:none;font-weight:700;}

/* ---------- Custom modal (replaces window.alert/confirm/prompt) ----------
   Native dialogs get silently blocked in sandboxed preview frames (e.g. when
   testing the file directly inside a chat interface rather than a real
   top-level browser tab), so every interactive dialog in this app uses this
   instead — it's just DOM/CSS, so it works identically everywhere. */
.cm-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.6);
  display:flex;align-items:center;justify-content:center;
  z-index:1000;padding:20px;
}
.cm-box{
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
  padding:20px;max-width:400px;width:100%;
  box-shadow:0 12px 40px rgba(0,0,0,0.5);
}
.cm-title{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:15px;margin-bottom:8px;}
.cm-message{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:14px;white-space:pre-wrap;}
.cm-input{
  width:100%;background:var(--surface-2);border:1px solid var(--border);color:var(--text);
  font-family:'Inter',sans-serif;font-size:13px;padding:9px 11px;border-radius:8px;
  margin-bottom:16px;resize:vertical;
}
.cm-input:focus{outline:none;border-color:var(--teal);}
.cm-actions{display:flex;justify-content:flex-end;gap:10px;flex-wrap:wrap;}
.cm-btn{
  font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13px;
  padding:8px 16px;border-radius:8px;cursor:pointer;border:none;
}
.cm-btn-primary{background:var(--teal);color:var(--bg);}
.cm-btn-primary:hover{opacity:0.9;}
.cm-btn-secondary{background:var(--surface-2);color:var(--text);border:1px solid var(--border);}
.cm-btn-secondary:hover{border-color:var(--teal);}

.log-details{margin-top:6px;}
.log-details summary{
  cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);
  padding:8px 2px;list-style:none;
}
.log-details summary::marker{display:none;}
.log-details summary::-webkit-details-marker{display:none;}
.log-details summary::before{content:'▶ ';display:inline-block;transition:transform .2s ease;}
.log-details[open] summary::before{transform:rotate(90deg);}
.log-details .log-list{margin-top:10px;margin-bottom:0;}

/* ---------- Logging date switch ---------- */
.logging-date-bar{
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:10px 14px;margin-bottom:12px;
}
.logging-date-bar.not-today{
  background:color-mix(in srgb, var(--amber) 12%, var(--surface));
  border-color:var(--amber);
}
.ldb-label{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;}
.logging-date-bar input[type="date"]{
  background:var(--surface-2);border:1px solid var(--border);color:var(--text);
  font-family:'JetBrains Mono',monospace;font-size:12px;padding:4px 7px;border-radius:6px;
}
.ldb-quick{
  background:var(--surface-2);border:1px solid var(--border);color:var(--text);
  font-family:'JetBrains Mono',monospace;font-size:11px;padding:4px 9px;border-radius:6px;cursor:pointer;
}
.ldb-quick:hover{border-color:var(--teal);}
.ldb-quick.active{background:var(--teal);color:var(--bg);border-color:var(--teal);font-weight:600;}
.ldb-warning{
  font-size:12px;color:var(--amber);font-weight:600;flex-basis:100%;
}

@media(max-width:640px){
  .stats{grid-template-columns:repeat(2,1fr);}
  header{flex-direction:column;align-items:flex-start;}
  .countdown{text-align:left;}
  .header-right{width:100%;justify-content:space-between;}
  .module-row{flex-wrap:wrap;}
  .wk-bars{gap:5px;}
  .wk-bar-track{max-width:22px;}
}
</style>
</head>

<script>

// Fixed identity per module so progress survives resets-of-data-shape and renames never happen.
function moduleId(subjectIdx, moduleIdx){ return 'm-' + subjectIdx + '-' + moduleIdx; }
function subjectId(subjectIdx){ return 's-' + subjectIdx; }

let state = null;
let resetArmed = false;

// ---- Custom modal engine (replaces window.alert/confirm/prompt everywhere) ----
// Native dialogs get silently swallowed in sandboxed preview iframes, so
// nothing in this app relies on them. Every call below is DOM/CSS only.
function showModal({title='', message='', input=false, textarea=false, inputValue='', inputPlaceholder='', buttons}){
  return new Promise(resolve => {
    const overlay = document.createElement('div');
    overlay.className = 'cm-overlay';
    const inputHtml = input
      ? (textarea
          ? `<textarea class="cm-input" rows="3" placeholder="${escapeHtml(inputPlaceholder)}">${escapeHtml(inputValue)}</textarea>`
          : `<input class="cm-input" type="text" placeholder="${escapeHtml(inputPlaceholder)}" value="${escapeHtml(inputValue)}">`)
      : '';
    overlay.innerHTML = `
      <div class="cm-box">
        ${title ? `<div class="cm-title">${escapeHtml(title)}</div>` : ''}
        ${message ? `<div class="cm-message">${escapeHtml(message)}</div>` : ''}
        ${inputHtml}
        <div class="cm-actions">
          ${buttons.map((b,i) => `<button class="cm-btn ${b.variant==='primary'?'cm-btn-primary':'cm-btn-secondary'}" data-idx="${i}">${escapeHtml(b.label)}</button>`).join('')}
        </div>
      </div>`;
    document.body.appendChild(overlay);
    const inputEl = overlay.querySelector('.cm-input');
    if(inputEl) inputEl.focus();

    function finish(value){
      overlay.remove();
      document.removeEventListener('keydown', escHandler);
      resolve(value);
    }
    overlay.querySelectorAll('.cm-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const chosen = buttons[Number(btn.dataset.idx)];
        finish(chosen.returnsInput ? (inputEl ? inputEl.value : '') : chosen.value);
      });
    });
    function escHandler(e){ if(e.key === 'Escape') finish(null); }
    document.addEventListener('keydown', escHandler);
    overlay.addEventListener('click', e => { if(e.target === overlay) finish(null); });
    if(inputEl && !textarea){
      inputEl.addEventListener('keydown', e => {
        if(e.key === 'Enter'){
          e.preventDefault();
          overlay.querySelector('.cm-btn-primary')?.click();
        }
      });
    }
  });
}

function genSyncKey(){
  return (crypto.randomUUID ? crypto.randomUUID() : (Date.now().toString(36) + Math.random().toString(36).slice(2)));

// Legacy anon keys are JWTs (start with "eyJ") and expect an Authorization: Bearer header.
// New publishable keys (start with "sb_publishable_") are not JWTs and only need the apikey header.
function cloudHeaders(extra){
  const h = Object.assign({ apikey: SUPABASE_ANON_KEY }, extra || {});
  if(SUPABASE_ANON_KEY.startsWith('eyJ')) h.Authorization = `Bearer ${SUPABASE_ANON_KEY}`;

async function cloudLoad(){
  if(!syncKey || !cloudConfigured()) return null;
  const res = await fetch(`${SUPABASE_URL}/rest/v1/gate_tracker?id=eq.${encodeURIComponent(syncKey)}&select=data`, {
    headers: cloudHeaders()
  });
  if(!res.ok) throw new Error('cloud load failed (' + res.status + ')');
  const rows = await res.json();
  return (rows && rows[0] && rows[0].data) ? rows[0].data : null;
}

async function cloudSave(data){
  if(!syncKey || !cloudConfigured()) return;
  const res = await fetch(`${SUPABASE_URL}/rest/v1/gate_tracker`, {
    method: 'POST',
    headers: cloudHeaders({
      'Content-Type': 'application/json',
      Prefer: 'resolution=merge-duplicates'
    }),
    body: JSON.stringify({ id: syncKey, data, updated_at: new Date().toISOString() })
  });
  if(!res.ok) throw new Error('cloud save failed (' + res.status + ')');
}

function freshProgress(){
  // map of moduleId -> watched hours
  const watched = {};
  SUBJECTS_DEF.forEach((s, si) => {
    s.modules.forEach((m, mi) => { watched[moduleId(si,mi)] = 0; });
  });
  return {
    examDate: '2027-02-07',
    targetDate: '2026-12-01',
    watched,
    open: {},
    logs: {} // 'YYYY-MM-DD' -> { hours: number, note: string }
  };
}

function backfillState(){
  SUBJECTS_DEF.forEach((s, si) => {
    s.modules.forEach((m, mi) => {
      const id = moduleId(si,mi);
      if(!(id in state.watched)) state.watched[id] = 0;
    });
  });
  if(!state.open) state.open = {};
  if(!state.logs) state.logs = {};
  if(!state.examDate) state.examDate = '2027-02-07';
  if(!state.targetDate) state.targetDate = '2026-12-01';

  // Migrate older log entries (single `note` string) to the sessions-list format.
  Object.keys(state.logs).forEach(d => {
    const entry = state.logs[d];
    if(!entry.bySubject) entry.bySubject = {};
    if(!entry.sessions){
      entry.sessions = [];
      if(entry.note && entry.note.trim()){
        entry.sessions.push({ time: null, si: null, mi: null, delta: 0, note: entry.note.trim() });
      }
    }
    delete entry.note;
  });
}

async function load(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    state = raw ? JSON.parse(raw) : freshProgress();
  }catch(e){
    console.error('Load failed, starting fresh', e);
    state = freshProgress();
  }
  backfillState();

  // If this device already has a sync key, pull the latest from the cloud
  // so edits made on the other device show up immediately.
  if(syncKey){
    try{
      const cloud = await cloudLoad();
      if(cloud && cloud.watched){
        state = cloud;
        backfillState();
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      } else {
        await cloudSave(state);
      }
    }catch(e){

function scheduleSave(){

}

async function setupSync(){
  if(!cloudConfigured()){
    await showAlert('The SUPABASE_URL / SUPABASE_ANON_KEY placeholders in the code still need to be filled in.', 'Cloud sync not configured yet');
    return;
  }
  const choice = await showChoice(
    'Set up cross-device sync',
    'Are you setting this up on a new pair of devices, or do you already have a sync key from another device?',
    'I have a key', 'Generate new key'
  );
  if(choice === null) return; // dismissed
  if(choice === 'primary'){
    syncKey = genSyncKey();
    localStorage.setItem(SYNC_KEY_STORAGE, syncKey);
    try{
      await cloudSave(state);
      setSaveStatus('saved');
    }catch(e){
      console.error(e);
      setSaveStatus('error');
    }
    await showPrompt(
      'Copy this and paste it into the tracker on your OTHER device (via "set up sync" → "I have a key"). Keep it private — anyone with this key can read/edit this tracker.',
      syncKey, { title:'Your sync key', okLabel:'Done', cancelLabel:'Done' }
    );
  } else {
    const k = await showPrompt('', '', { title:'Paste your sync key', placeholder:'Sync key', okLabel:'Connect' });
    if(!k || !k.trim()) return;
    syncKey = k.trim();
    localStorage.setItem(SYNC_KEY_STORAGE, syncKey);
    try{
      const cloud = await cloudLoad();
      if(cloud && cloud.watched){
        state = cloud;
        backfillState();
      } else {
        await cloudSave(state);
      }
      setSaveStatus('saved');
    }catch(e){
      console.error(e);
      await showAlert('Could not reach the cloud with that key: ' + e.message);
      setSaveStatus('error');
    }
  }

  render();
}

function daysUntil(dateStr){

  const now = new Date(); now.setHours(0,0,0,0);

}

function clampPct(a,b){ if(b<=0) return 0; return Math.min(100, Math.round((a/b)*100)); }

function moduleWatched(si, mi){
  return state.watched[moduleId(si,mi)] || 0;
}

function subjectTotals(si){
  const s = SUBJECTS_DEF[si];
  const target = s.modules.reduce((a,m)=>a+m[1],0);
  let watched = 0, done = 0;
  s.modules.forEach((m, mi) => {
    const w = moduleWatched(si, mi);
    watched += w;
    if(w >= m[1]) done++;
  });
  return {target, watched, done, total: s.modules.length};
}

function overallStats(){
  let target=0, watched=0, doneModules=0, totalModules=0;
  SUBJECTS_DEF.forEach((s, si) => {
    const t = subjectTotals(si);
    target += t.target; watched += t.watched;
    doneModules += t.done; totalModules += t.total;
  });
  return {target, watched, doneModules, totalModules, pct: clampPct(watched, target)};
}

// ---- Daily Log: per-day hours + notes, hours auto-tracked but also manually fixable for any date ----
let editingLogDate = null;    // date currently loaded into the note form, or null
let editingSessionIdx = null; // index within that date's sessions array being edited, or null (= adding new)

function nowTimeStr(){
  const d = new Date();
  let h = d.getHours(), m = d.getMinutes();
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12; if(h === 0) h = 12;
  return `${h}:${String(m).padStart(2,'0')} ${ampm}`;
}

// Local-date string helper that avoids UTC-conversion bugs (toISOString() shifts
// the date by a day for anyone east of UTC, e.g. India, right around midnight).
function dateToStr(d){
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function todayStr(){ return dateToStr(new Date()); }

function formatLogDate(dstr){
  const d = new Date(dstr + 'T00:00:00');
  return d.toLocaleDateString('en-IN', {weekday:'short', day:'numeric', month:'short', year:'numeric'});
}

function subjectColor(si){
  const hue = Math.round((si * 360) / SUBJECTS_DEF.length);
  return `hsl(${hue}, 55%, 55%)`;
}

function yesterdayStr(){
  const d = new Date(); d.setDate(d.getDate()-1);
  return dateToStr(d);
}

// ---- Logging date switch: which date +/- actions in Subjects get attributed to ----
// Not persisted on purpose — always starts back at "today" on a fresh load,
// so you can never accidentally leave it stuck on a past date between sessions.
let loggingDate = todayStr();
let sessionLoadDate = todayStr();

// Called whenever a module's watched hours change in the Subjects section.
// Attributes the change to `loggingDate` (today, unless the logging-date
// switch has been set to a past date to backfill a forgotten/incorrect day).
// Tracks both the running daily total AND which subject it came from, so the
// weekly graph can show a per-subject breakdown. Manual edits made from the
// Daily Log form only touch `hours` (not bySubject) — the graph fills that
// gap in with a grey "manual" segment, so the bar height always stays honest.
function logHoursDelta(si, delta){
  if(!delta) return;
  const d = loggingDate;
  if(!state.logs[d]) state.logs[d] = { hours: 0, bySubject: {}, sessions: [] };
  if(!state.logs[d].bySubject) state.logs[d].bySubject = {};
  state.logs[d].hours = Math.max(0, +((state.logs[d].hours || 0) + delta).toFixed(2));
  const cur = state.logs[d].bySubject[si] || 0;
  const nv = +(cur + delta).toFixed(2);
  if(nv <= 0) delete state.logs[d].bySubject[si];
  else state.logs[d].bySubject[si] = nv;
}

// Fires only for positive additions (never for -0.5 corrections) right after
// the hours have already been applied. Skippable — Cancel or an empty answer
// just means no note gets attached, the hours themselves are unaffected either way.
async function promptSessionNote(si, mi, delta){
  const modName = SUBJECTS_DEF[si].modules[mi][0];
  const note = await showPrompt(
    `${modName} · +${delta}h`, '',
    { title:'What did you just cover?', okLabel:'Save', cancelLabel:'Skip', placeholder:'Optional — topic or lecture name', textarea:true }
  );
  if(note && note.trim()){
    const d = loggingDate;
    if(!state.logs[d]) state.logs[d] = { hours: 0, bySubject: {}, sessions: [] };
    if(!state.logs[d].sessions) state.logs[d].sessions = [];
    state.logs[d].sessions.push({ time: nowTimeStr(), si, mi, delta, note: note.trim() });
    scheduleSave(); render();
  }
}

function last7Days(){
  const days = [];
  const base = new Date(); base.setHours(0,0,0,0);
  for(let i=6;i>=0;i--){
    const d = new Date(base);
    d.setDate(d.getDate()-i);
    days.push(dateToStr(d));
  }
  return days;
}

// Breaks a day's total hours into colored segments, one per subject that
// contributed that day (via the Subjects section / logging-date switch).
function daySegments(d){
  const entry = state.logs[d];
  if(!entry || !entry.hours) return [];
  const total = entry.hours;
  const by = entry.bySubject || {};
  let segs = Object.keys(by).map(si => ({
    si: Number(si), hours: by[si], color: subjectColor(Number(si)), label: SUBJECTS_DEF[Number(si)].name
  })).filter(s => s.hours > 0);

  const attributed = segs.reduce((a,s)=>a+s.hours,0);
  if(attributed > 0 && Math.abs(attributed - total) > 0.01){
    // Only ever minor floating-point drift now that hours aren't manually
    // editable — rescale segments so they still fill the bar exactly.
    const scale = total / attributed;
    segs = segs.map(s => ({...s, hours: +(s.hours*scale).toFixed(2)}));
  }
  return segs;
}

function weeklyGraphHtml(targetPaceNum){
  const days = last7Days();
  const totals = days.map(d => (state.logs[d] && state.logs[d].hours) || 0);
  const max = Math.max(1, targetPaceNum || 0, ...totals);
  const today = todayStr();

  const legendMap = new Map(); // si (or 'manual') -> {label, color}

  const bars = days.map((d,i) => {
    const total = totals[i];
    const segs = daySegments(d);
    segs.forEach(s => {
      const key = s.si === null ? 'manual' : s.si;
      if(!legendMap.has(key)) legendMap.set(key, {label: s.label, color: s.color});
    });
    const barPct = total > 0 ? Math.max(4, Math.round((total/max)*100)) : 0;
    const isToday = d === today;
    const metGoal = !!(targetPaceNum && total >= targetPaceNum && total > 0);
    const dayLabel = new Date(d+'T00:00:00').toLocaleDateString('en-IN',{weekday:'short'});
    const lblClass = isToday ? 'today' : (metGoal ? 'met' : '');

    const segHtml = segs.map(s => {
      const segPct = Math.round((s.hours/total)*100);
      return `<div class="wk-seg" style="height:${segPct}%;background:${s.color}" title="${escapeHtml(s.label)}: ${s.hours}h"></div>`;
    }).join('');

    return `
      <div class="wk-bar-col" title="${formatLogDate(d)} — ${total}h${metGoal ? ' · hit target ✓' : ''}">
        <div class="wk-bar-val">${total>0?total+'h':''}</div>
        <div class="wk-bar-track ${isToday?'today':''}">
          <div class="wk-bar-fill-wrap" style="height:${barPct}%">${segHtml}</div>
        </div>
        <div class="wk-bar-lbl ${lblClass}">${dayLabel}</div>
      </div>`;
  }).join('');

  const weekTotal = totals.reduce((a,b)=>a+b,0);
  const avg = weekTotal / 7;

  const legendHtml = legendMap.size
    ? Array.from(legendMap.values()).map(l => `<span class="wk-legend-chip"><i style="background:${l.color}"></i>${escapeHtml(l.label)}</span>`).join('')
    : `<span class="wk-legend-chip empty">No hours logged this week yet — tick off progress in Subjects to see it here.</span>`;

  // Three faint horizontal gridlines for depth/readability.
  const gridlinesHtml = [25,50,75].map(pct => `<div class="wk-gridline" style="bottom:${pct}%"></div>`).join('');

  let targetLineHtml = '';
  if(targetPaceNum && targetPaceNum > 0){
    const linePct = Math.min(100, Math.round((targetPaceNum/max)*100));
    targetLineHtml = `
      <div class="wk-target-line" style="bottom:${linePct}%">
        <span class="wk-target-label">target ${targetPaceNum.toFixed(1)}h/day</span>
      </div>`;
  }

  return `
    <div class="wk-graph">
      <div class="wk-graph-head">
        <span class="wk-graph-title">This Week</span>
        <span class="wk-graph-total">${weekTotal.toFixed(1)}h total · ${avg.toFixed(1)}h/day avg</span>
      </div>
      <div class="wk-bars-wrap">
        ${gridlinesHtml}
        ${targetLineHtml}
        <div class="wk-bars">${bars}</div>
      </div>
      <div class="wk-legend">${legendHtml}</div>
    </div>
  `;
}

function sessionHtml(d, s, idx){

  const tag = hasSubject

      <div class="session-note">${escapeHtml(s.note)}</div>
      <div class="session-actions">
        <button class="editSessionBtn" data-date="${d}" data-idx="${idx}">edit</button>
        <button class="deleteSessionBtn" data-date="${d}" data-idx="${idx}">delete</button>
      </div>
    </div>`;
}

function dailyLogSectionHtml(){
  const dates = Object.keys(state.logs)
    .filter(d => state.logs[d].hours || (state.logs[d].sessions && state.logs[d].sessions.length))
    .sort((a,b) => b.localeCompare(a));
  const totalHrs = dates.reduce((sum,d) => sum + (state.logs[d].hours || 0), 0);

  const entriesHtml = dates.map(d => {
    const e = state.logs[d];
    const sessions = e.sessions || [];
    const sessionsHtml = sessions.length
      ? sessions.map((s, idx) => sessionHtml(d, s, idx)).join('')
      : `<div class="session-empty">No notes logged for this day.</div>`;
    return `
      <div class="log-entry">
        <div class="log-entry-top">
          <span class="log-date">${formatLogDate(d)}</span>
          <span class="log-hours">${e.hours}h</span>
        </div>
        <div class="session-list">${sessionsHtml}</div>
      </div>`;
  }).join('') || `<div class="log-empty">No entries yet.</div>`;

  const editingSession = (editingLogDate !== null && editingSessionIdx !== null
    && state.logs[editingLogDate] && state.logs[editingLogDate].sessions
    && state.logs[editingLogDate].sessions[editingSessionIdx])
    ? state.logs[editingLogDate].sessions[editingSessionIdx] : null;
  const isEditing = !!editingSession;
  const formDate = editingLogDate || todayStr();
  const formNote = editingSession ? editingSession.note : '';

  return `
    <div class="section-head">
      <h2>Daily Log</h2>
      <span class="log-total">${totalHrs.toFixed(1)}h logged · ${dates.length} day${dates.length===1?'':'s'}</span>
    </div>
    <div class="log-hint">Whenever you add hours in Subjects, you'll be asked what you covered — skip anytime, it's optional. Use this box to add a general note for any date, or to log something after the fact.</div>
    <div class="log-form">
      <div class="log-field">
        <label for="logDateInput">Date</label>
        <input type="date" id="logDateInput" value="${formDate}" max="${todayStr()}" ${isEditing ? 'disabled' : ''}>
      </div>
      <label for="logNoteInput">Note</label>
      <textarea id="logNoteInput" rows="2" placeholder="What did you cover?">${escapeHtml(formNote)}</textarea>
      <div class="log-form-actions">
        <button id="saveLogBtn">${isEditing ? 'Update note' : 'Add note'}</button>
        ${isEditing ? '<button id="cancelLogEditBtn">cancel</button>' : ''}
      </div>
    </div>
    <details class="log-details">
      <summary>Previous entries (${dates.length})</summary>
      <div class="log-list">${entriesHtml}</div>
    </details>
  `;
}

function render(){
  const app = document.getElementById('app');
  const st = overallStats();
  const examDl = daysUntil(state.examDate);
  const targetDl = daysUntil(state.targetDate);
  const hrsRemaining = Math.max(0, st.target - st.watched);
  const pace = (targetDl && targetDl > 0) ? (hrsRemaining / targetDl).toFixed(1) : (targetDl <= 0 ? 'overdue' : '—');
  const targetPaceNum = (targetDl && targetDl > 0) ? (hrsRemaining / targetDl) : null;

  app.innerHTML = `
    <header>
      <div class="title-block">
        <div class="eyebrow">Syllabus Control Panel</div>
        <h1>GATE CSE 2027</h1>
      </div>
      <div class="header-right">
        <button id="themeToggleBtn" class="theme-toggle" title="Toggle light/dark mode">${theme==='dark' ? '☀️' : '🌙'}</button>
        <div class="countdown">
          <div class="num">${examDl >= 0 ? examDl : 0}</div>
          <div class="lbl">${examDl >= 0 ? 'days to exam' : 'exam date passed'}</div>
          <input type="date" id="examDateInput" value="${state.examDate}">
        </div>
      </div>
    </header>

    <div class="stats">
      <div class="stat-card">
        <div class="val amber">${st.pct}%</div>
        <div class="lbl">Hours-weighted progress</div>
      </div>
      <div class="stat-card">
        <div class="val teal">${st.watched.toFixed(1)}<span style="color:var(--muted);font-size:13px;"> / ${st.target.toFixed(0)}h</span></div>
        <div class="lbl">Lecture hours watched</div>
      </div>
      <div class="stat-card">
        <div class="val">${st.doneModules}/${st.totalModules}</div>
        <div class="lbl">Modules completed</div>
      </div>
      <div class="stat-card target-card">
        <div>
          <div class="val ${targetDl<=0 ? '' : 'amber'}" style="${targetDl<=0?'color:var(--rose);':''}">${pace}${pace!=='—'&&pace!=='overdue'?'h':''}</div>
          <div class="lbl">Hrs/day to hit your target</div>
        </div>
        <div class="target-date-row">
          <label for="targetDateInput">Your target finish date</label>
          <input type="date" id="targetDateInput" value="${state.targetDate}">
        </div>
      </div>
    </div>

    ${weeklyGraphSectionHtml(targetPaceNum)}

    ${loggingDateBarHtml()}
    <div class="section-head">
      <h2>Subjects</h2>
    </div>

    <div class="subjects" id="subjectGrid"></div>

    ${dailyLogSectionHtml()}

    <footer>
      <div class="footer-row">
        <span id="saveStatus" style="color:${SAVE_STATUS_LABEL[saveStatus].color}">${SAVE_STATUS_LABEL[saveStatus].text}</span>
      </div>
      <div class="footer-row">
        ${syncLinkRow()}
      </div>
      <div class="footer-row">
        <button id="exportBtn">manual backup (.json)</button>
        · <button id="importBtn">import .json</button>
        <input type="file" id="importFile" accept="application/json" style="display:none;">
        · <button id="resetBtn">reset all logged hours</button>
      </div>
    </footer>
  `;

  const grid = document.getElementById('subjectGrid');
  SUBJECTS_DEF.forEach((s, si) => {
    const sid = subjectId(si);
    const t = subjectTotals(si);
    const pct = clampPct(t.watched, t.target);
    const isOpen = !!state.open[sid];

    const card = document.createElement('div');
    card.className = 'subject-card' + (isOpen ? ' open' : '');

    const modulesHtml = s.modules.map((m, mi) => {
      const [name, target] = m;
      const watched = moduleWatched(si, mi);
      const mPct = clampPct(watched, target);
      const isDone = watched >= target;
      const atMax = watched >= target;
      return `
        <div class="module-row">
          <div class="module-check ${isDone ? 'done':''}" data-action="toggle-done" data-si="${si}" data-mi="${mi}" role="checkbox" aria-checked="${isDone}" tabindex="0">${isDone ? '✓':''}</div>
          <div class="module-body">
            <div class="module-top">
              <span class="module-name">${escapeHtml(name)}</span>
              <span class="module-hrs ${atMax?'at-max':''}">
                <input type="number" class="hrs-input" data-action="set-hr" data-si="${si}" data-mi="${mi}" value="${watched.toFixed(2)}" min="0" max="${target}" step="0.25"> / ${target}h
              </span>
            </div>
            <div class="module-bar-row">
              <div class="bar-track" style="flex:1;"><div class="bar-fill teal" style="width:${mPct}%"></div></div>
              <div class="module-controls">
                <button data-action="add-hr" data-si="${si}" data-mi="${mi}" data-amt="0.5" ${atMax?'disabled':''}>+0.5</button>
                <button data-action="add-hr" data-si="${si}" data-mi="${mi}" data-amt="1" ${atMax?'disabled':''}>+1</button>
                <button data-action="add-hr" data-si="${si}" data-mi="${mi}" data-amt="-0.5" ${watched<=0?'disabled':''}>−0.5</button>
              </div>
            </div>
          </div>
        </div>
      `;
    }).join('');

    card.innerHTML = `
      <div class="subject-head" data-action="toggle-open" data-sid="${sid}">
        <div class="chevron">▶</div>
        <div class="subject-main">
          <div class="subject-name-row">
            <span class="name">${escapeHtml(s.name)}</span>
            <span class="figure"><span class="pct">${pct}%</span> · ${t.watched.toFixed(1)}/${t.target.toFixed(1)}h · ${t.done}/${t.total} modules</span>
          </div>
          <div class="bar-track"><div class="bar-fill amber" style="width:${pct}%"></div></div>
        </div>
      </div>
      <div class="modules-wrap">
        ${modulesHtml}
      </div>
    `;
    grid.appendChild(card);
  });

  attachHandlers();
}

function attachHandlers(){
  document.getElementById('themeToggleBtn').addEventListener('click', toggleTheme);

  document.getElementById('ldbTodayBtn').addEventListener('click', ()=>{
    loggingDate = todayStr(); render();
  });
  document.getElementById('ldbYesterdayBtn').addEventListener('click', ()=>{
    loggingDate = yesterdayStr(); render();
  });
  document.getElementById('loggingDateInput').addEventListener('change', e=>{
    loggingDate = e.target.value || todayStr(); render();
  });

  document.getElementById('examDateInput').addEventListener('change', e=>{
    state.examDate = e.target.value; scheduleSave(); render();
  });
  document.getElementById('targetDateInput').addEventListener('change', e=>{
    state.targetDate = e.target.value; scheduleSave(); render();
  });

  document.getElementById('exportBtn').addEventListener('click', exportData);

  document.getElementById('saveLogBtn').addEventListener('click', ()=>{
    const dateInput = document.getElementById('logDateInput');
    const noteInput = document.getElementById('logNoteInput');

    const note = noteInput.value.trim();
    if(!note){ showAlert('Write a note first (or cancel).'); return; }

    if(editingLogDate !== null && editingSessionIdx !== null){
      // Updating an existing session's text in place.
      const sess = state.logs[editingLogDate] && state.logs[editingLogDate].sessions && state.logs[editingLogDate].sessions[editingSessionIdx];
      if(sess) sess.note = note;
    } else {
      const date = dateInput.value;
      if(!date){ showAlert('Pick a date first.'); return; }
      if(!state.logs[date]) state.logs[date] = { hours: 0, bySubject: {}, sessions: [] };
      if(!state.logs[date].sessions) state.logs[date].sessions = [];
      state.logs[date].sessions.push({ time: nowTimeStr(), si: null, mi: null, delta: 0, note });
    }
    editingLogDate = null; editingSessionIdx = null;
    scheduleSave(); render();
  });

  const cancelLogEditBtn = document.getElementById('cancelLogEditBtn');
  if(cancelLogEditBtn) cancelLogEditBtn.addEventListener('click', ()=>{
    editingLogDate = null; editingSessionIdx = null;
    render();
  });

  document.querySelector('.log-list').addEventListener('click', (e)=>{
    const editBtn = e.target.closest('.editSessionBtn');
    if(editBtn){
      editingLogDate = editBtn.dataset.date;
      editingSessionIdx = Number(editBtn.dataset.idx);
      render();
      document.getElementById('logNoteInput')?.focus();
      return;
    }
    const delBtn = e.target.closest('.deleteSessionBtn');
    if(delBtn){
      // Two-click confirm. This only ever removes a single note entry — it
      // must never touch .hours/.bySubject, since those represent real
      // auto-tracked subject progress, not something a "delete note" action
      // should erase.
      if(!delBtn.classList.contains('confirming')){
        delBtn.classList.add('confirming');
        delBtn.textContent = 'confirm?';
        clearTimeout(delBtn._armTimer);
        delBtn._armTimer = setTimeout(()=>{
          delBtn.classList.remove('confirming');
          delBtn.textContent = 'delete';
        }, 3000);
        return;
      }
      clearTimeout(delBtn._armTimer);
      const d = delBtn.dataset.date;
      const idx = Number(delBtn.dataset.idx);
      if(state.logs[d] && state.logs[d].sessions){
        state.logs[d].sessions.splice(idx, 1);
        if(!state.logs[d].hours && state.logs[d].sessions.length === 0) delete state.logs[d];
      }
      if(editingLogDate === d && editingSessionIdx === idx){ editingLogDate = null; editingSessionIdx = null; }
      scheduleSave(); render();
      return;
    }
  });

  const setupSyncBtn = document.getElementById('setupSyncBtn');
  if(setupSyncBtn) setupSyncBtn.addEventListener('click', setupSync);
  const copyKeyBtn = document.getElementById('copyKeyBtn');
  if(copyKeyBtn) copyKeyBtn.addEventListener('click', copySyncKey);
  const stopSyncBtn = document.getElementById('stopSyncBtn');
  if(stopSyncBtn) stopSyncBtn.addEventListener('click', stopSync);

  const importFileInput = document.getElementById('importFile');
  document.getElementById('importBtn').addEventListener('click', ()=>{
    importFileInput.click();
  });
  importFileInput.addEventListener('change', (e)=>{
    const file = e.target.files[0];
    if(file) importData(file);
    importFileInput.value = '';
  });

  const resetBtn = document.getElementById('resetBtn');
  resetBtn.addEventListener('click', ()=>{
    if(!resetArmed){
      resetArmed = true;
      resetBtn.textContent = 'click again to confirm reset';
      resetBtn.classList.add('confirming');
      clearTimeout(window._resetT);
      window._resetT = setTimeout(()=>{
        resetArmed = false;
        resetBtn.textContent = 'reset all logged hours';
        resetBtn.classList.remove('confirming');
      }, 3000);
      return;
    }
    // second click: actually reset
    resetArmed = false;
    clearTimeout(window._resetT);
    const keepExam = state.examDate;
    const keepTarget = state.targetDate;
    const keepLogs = state.logs; // resetting module progress shouldn't erase your daily-log history
    state = freshProgress();
    state.examDate = keepExam;
    state.targetDate = keepTarget;
    state.logs = keepLogs;
    scheduleSave(); render();
  });

  document.getElementById('subjectGrid').addEventListener('click', (e)=>{
    const toggle = e.target.closest('[data-action="toggle-open"]');
    if(toggle){
      const sid = toggle.dataset.sid;
      state.open[sid] = !state.open[sid];
      scheduleSave(); render();
      return;
    }
    const checkbox = e.target.closest('[data-action="toggle-done"]');
    if(checkbox){
      const si = Number(checkbox.dataset.si);
      const mi = Number(checkbox.dataset.mi);
      const target = SUBJECTS_DEF[si].modules[mi][1];
      const id = moduleId(si, mi);
      const before = state.watched[id] || 0;
      const isDone = before >= target;
      // Click fills the bar to 100%; click again to clear it back to 0.
      const after = isDone ? 0 : target;
      state.watched[id] = after;
      logHoursDelta(si, after - before);
      if(after - before > 0) promptSessionNote(si, mi, after - before);
      scheduleSave(); render();
      return;
    }
    const addBtn = e.target.closest('[data-action="add-hr"]');
    if(addBtn){
      if(addBtn.disabled) return;
      const si = Number(addBtn.dataset.si);
      const mi = Number(addBtn.dataset.mi);
      const amt = parseFloat(addBtn.dataset.amt);
      const target = SUBJECTS_DEF[si].modules[mi][1];
      const id = moduleId(si, mi);
      const current = state.watched[id] || 0;
      const next = Math.min(target, Math.max(0, +(current + amt).toFixed(2)));
      state.watched[id] = next;
      logHoursDelta(si, next - current);
      if(next - current > 0) promptSessionNote(si, mi, next - current);
      scheduleSave(); render();
      return;
    }
  });

  // Keyboard support for the checkbox (it's a div with role="checkbox")
  document.getElementById('subjectGrid').addEventListener('keydown', (e)=>{
    if(e.key !== 'Enter' && e.key !== ' ') return;
    const checkbox = e.target.closest('[data-action="toggle-done"]');
    if(!checkbox) return;
    e.preventDefault();
    checkbox.click();
  });

  // Typing an exact hours value directly into a module
  document.getElementById('subjectGrid').addEventListener('change', (e)=>{
    const input = e.target.closest('.hrs-input');
    if(!input) return;
    const si = Number(input.dataset.si);
    const mi = Number(input.dataset.mi);
    const target = SUBJECTS_DEF[si].modules[mi][1];
    const id = moduleId(si, mi);
    const before = state.watched[id] || 0;
    let v = parseFloat(input.value);
    if(isNaN(v)) v = before;
    v = Math.min(target, Math.max(0, +v.toFixed(2)));
    state.watched[id] = v;
    logHoursDelta(si, v - before);
    if(v - before > 0) promptSessionNote(si, mi, v - before);
    scheduleSave(); render();
  });
}

load();
</script>
</body>
</html>
